<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>NEXTBASE CORE v1.52</title>
    <style>
        :root { --accent: #00d4ff; --bg: #000; --panel: #0a0a0b; --border: #1a1a1c; --warn: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Hiragino Kaku Gothic ProN', 'SF Pro Display', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* ヘッダー：ビジネス・ステータス */
        header { padding: env(safe-area-inset-top) 15px 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .brand { font-size: 14px; font-weight: 900; letter-spacing: 4px; color: var(--accent); }
        .lang-status { font-family: monospace; font-size: 9px; color: #444; }

        main { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 15px; }
        .chamber { background: var(--panel); border: 1px solid var(--border); padding: 15px; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; height: 100px; resize: none; line-height: 1.5; }
        
        .btn-group { display: flex; gap: 10px; }
        .exec-btn { flex: 2; background: #fff; color: #000; border: none; padding: 20px; font-weight: 900; font-size: 15px; letter-spacing: 2px; }
        .pay-btn { flex: 1; background: var(--warn); color: #fff; border: none; padding: 20px; font-weight: 900; font-size: 12px; text-decoration: none; text-align: center; }

        .output-area { flex: 1; background: #000; border-left: 3px solid var(--accent); padding: 20px; overflow-y: auto; }
        .label { font-size: 9px; color: #555; letter-spacing: 1px; margin-bottom: 10px; font-weight: 800; }
        #ot { font-size: 20px; font-weight: 600; line-height: 1.6; white-space: pre-wrap; color: #fff; }

        footer { height: 80px; border-top: 1px solid var(--border); padding: 10px; font-family: monospace; font-size: 9px; color: #333; }
    </style>
</head>
<body>
    <header>
        <div class="brand">NEXTBASE_CORE</div>
        <div class="lang-status">LANG: JA/EN | DICT: 152,400</div>
    </header>
    
    <main>
        <div class="chamber">
            <textarea id="it" placeholder="COMMAND_INPUT..."></textarea>
            <div class="btn-group">
                <button class="exec-btn" onclick="exec()">執行 (EXECUTE)</button>
                <a href="https://info-nextbase.vercel.app/billing" class="pay-btn">PAYMENT</a>
            </div>
        </div>
        
        <div class="output-area">
            <div class="label">150K_DICT_MATCH_RESULT</div>
            <div id="ot">AWAITING_COMMAND...</div>
        </div>
    </main>

    <footer id="lg">> SYSTEM_READY<br>> AWAITING_GATEWAY_INSTRUCTION</footer>

    <script>
        async function exec() {
            const t = document.getElementById('it').value; if(!t) return;
            const ot = document.getElementById('ot');
            ot.innerText = "PROCESSING...";
            try {
                const r = await fetch('http://[2a09:bac2:4426:2e0a::496:f]:8888', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: t, lang: "ja"}) // 言語設定を明示
                });
                const d = await r.json();
                ot.innerText = d.result || d.output;
            } catch(e) {
                ot.innerText = "CONNECTION_ERROR";
            }
        }
    </script>
</body>
</html>
