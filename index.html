<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB TRAVEL</title>
    <style>
        :root { --gold: #d6b25e; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; }
        .hero { position: fixed; inset: 0; opacity: 0.25; z-index: -1; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; text-align: center; }
        .screen.active { display: flex; }

        .screen h1 { font-size: clamp(28px, 6vw, 42px); letter-spacing: 6px; margin: 0 0 8px; }
        .screen .lead { font-size: clamp(16px, 2.5vw, 20px); color: #bbb; margin: 0 0 24px; line-height: 1.5; }
        .lang-select-wrap { margin: 24px 0; min-width: 280px; }
        .lang-select-wrap select { width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(214,178,94,.45); border-radius: 14px; color: var(--gold); font-size: 18px; cursor: pointer; }
        .opening-note { font-size: 15px; color: #888; margin-top: 10px; line-height: 1.5; }
        .main-btn { background: var(--gold); color: #000; padding: 20px 88px; border-radius: 44px; font-weight: bold; border: none; font-size: 20px; cursor: pointer; margin-top: 32px; }
        .main-btn.ghost { background: transparent; color: var(--gold); border: 2px solid rgba(214,178,94,.5); margin-top: 20px; font-size: 18px; }
        .row { display: flex; gap: 16px; align-items: center; justify-content: center; margin: 24px 0; flex-wrap: wrap; }
        .row select { padding: 14px 18px; border-radius: 10px; background: rgba(0,0,0,.5); border: 1px solid #444; color: #fff; font-size: 17px; min-width: 140px; }
        .row .arrow { font-size: 22px; color: var(--gold); }
        #input-text { width: 100%; max-width: 420px; min-height: 120px; border-radius: 14px; padding: 18px; background: rgba(255,255,255,.06); border: 1px solid #333; color: #fff; font-size: 18px; margin-top: 8px; }
        #input-text::placeholder { color: #666; font-size: 17px; }
        #result-area { margin-top: 24px; font-size: 20px; color: var(--gold); max-width: 420px; text-align: left; line-height: 1.6; min-height: 2em; }
        #stella-tag { font-size: 12px; color: #666; margin-top: 32px; }
        .main-desc { font-size: 16px; color: #999; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="hero"><img src="/glb-hero.jpg" alt=""></div>

    <div id="view-start" class="screen active">
        <h1 style="color:var(--gold);">GLB TRAVEL</h1>
        <p class="lead" id="t-select-label">表示言語を選んでください</p>
        <p class="opening-note" id="t-select-note">※アプリの表示言語です（翻訳する言語は次の画面で選択）</p>
        <div class="lang-select-wrap">
            <select id="opening-lang">
                <option value="ja">日本語</option>
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ko">한국어</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="pt">Português</option>
                <option value="ru">Русский</option>
                <option value="it">Italiano</option>
                <option value="ar">العربية</option>
                <option value="th">ไทย</option>
                <option value="vi">Tiếng Việt</option>
                <option value="id">Bahasa Indonesia</option>
                <option value="tr">Türkçe</option>
                <option value="pl">Polski</option>
                <option value="nl">Nederlands</option>
                <option value="sv">Svenska</option>
                <option value="el">Ελληνικά</option>
            </select>
        </div>
        <button class="main-btn" id="t-start-btn" onclick="tapStart()">始める</button>
        <p id="stella-tag">STELLA ADMIN ACTIVE: v1.0.2603</p>
    </div>

    <div id="view-main" class="screen">
        <h1 style="color:var(--gold);">GLB</h1>
        <p class="main-desc" id="t-main-desc">翻訳する言語を選んで GLB を実行</p>
        <div class="row">
            <select id="lang-from"></select>
            <span class="arrow">→</span>
            <select id="lang-to"></select>
        </div>
        <textarea id="input-text" placeholder=""></textarea>
        <button class="main-btn" id="t-glb-btn" onclick="doGLB()">GLB</button>
        <div id="result-area"></div>
        <button class="main-btn ghost" id="t-back-btn" onclick="location.reload()">最初に戻る</button>
        <p id="stella-tag">STELLA ADMIN ACTIVE: v1.0.2603</p>
    </div>

    <script>
        var LANG_LIST = [
            { v: 'ja', n: '日本語' }, { v: 'en', n: 'English' }, { v: 'zh', n: '中文' }, { v: 'ko', n: '한국어' },
            { v: 'es', n: 'Español' }, { v: 'fr', n: 'Français' }, { v: 'de', n: 'Deutsch' }, { v: 'pt', n: 'Português' },
            { v: 'ru', n: 'Русский' }, { v: 'it', n: 'Italiano' }, { v: 'ar', n: 'العربية' }, { v: 'th', n: 'ไทย' },
            { v: 'vi', n: 'Tiếng Việt' }, { v: 'id', n: 'Indonesia' }, { v: 'tr', n: 'Türkçe' }, { v: 'pl', n: 'Polski' },
            { v: 'nl', n: 'Nederlands' }, { v: 'sv', n: 'Svenska' }, { v: 'el', n: 'Ελληνικά' }
        ];

        var T = {
            ja: { selectLabel: '表示言語を選んでください', selectNote: '※アプリの表示言語です（翻訳する言語は次の画面で選択）', start: '始める', mainDesc: '翻訳する言語を選んで GLB を実行', placeholder: 'ここに言葉を入力...', glb: 'GLB', back: '最初に戻る', thinking: '翻訳中...', error: '通信エラー。もう一度お試しください。' },
            en: { selectLabel: 'Choose display language', selectNote: 'App UI language. Translation languages are selected on the next screen.', start: 'Start', mainDesc: 'Select languages and run GLB', placeholder: 'Enter text here...', glb: 'GLB', back: 'Back to start', thinking: 'Translating...', error: 'Network error. Please try again.' },
            zh: { selectLabel: '请选择显示语言', selectNote: '应用界面语言。翻译语言在下一画面选择。', start: '开始', mainDesc: '选择语言并执行 GLB', placeholder: '在此输入文字...', glb: 'GLB', back: '返回开始', thinking: '翻译中...', error: '网络错误，请重试。' },
            ko: { selectLabel: '표시 언어를 선택하세요', selectNote: '앱 UI 언어입니다. 번역 언어는 다음 화면에서 선택합니다.', start: '시작', mainDesc: '언어를 선택하고 GLB 실행', placeholder: '여기에 입력...', glb: 'GLB', back: '처음으로', thinking: '번역 중...', error: '오류. 다시 시도해 주세요.' },
            es: { selectLabel: 'Elige el idioma de la app', selectNote: 'Idioma de la interfaz. Los idiomas de traducción se eligen en la siguiente pantalla.', start: 'Empezar', mainDesc: 'Elige idiomas y ejecuta GLB', placeholder: 'Escribe aquí...', glb: 'GLB', back: 'Volver al inicio', thinking: 'Traduciendo...', error: 'Error de red. Intenta de nuevo.' },
            fr: { selectLabel: 'Choisissez la langue de l\'app', selectNote: 'Langue de l\'interface. Les langues de traduction se choisissent à l\'écran suivant.', start: 'Commencer', mainDesc: 'Choisissez les langues et lancez GLB', placeholder: 'Entrez le texte ici...', glb: 'GLB', back: 'Retour au début', thinking: 'Traduction...', error: 'Erreur réseau. Réessayez.' },
            de: { selectLabel: 'Sprache der App wählen', selectNote: 'Oberflächensprache. Übersetzungssprachen wählen Sie auf dem nächsten Bildschirm.', start: 'Starten', mainDesc: 'Sprachen wählen und GLB ausführen', placeholder: 'Text hier eingeben...', glb: 'GLB', back: 'Zurück zum Start', thinking: 'Übersetzen...', error: 'Netzwerkfehler. Bitte erneut versuchen.' },
            pt: { selectLabel: 'Escolha o idioma da app', selectNote: 'Idioma da interface. Idiomas de tradução na próxima tela.', start: 'Começar', mainDesc: 'Escolha os idiomas e execute GLB', placeholder: 'Digite aqui...', glb: 'GLB', back: 'Voltar ao início', thinking: 'Traduzindo...', error: 'Erro de rede. Tente novamente.' },
            ru: { selectLabel: 'Выберите язык интерфейса', selectNote: 'Язык приложения. Языки перевода выбираются на следующем экране.', start: 'Начать', mainDesc: 'Выберите языки и нажмите GLB', placeholder: 'Введите текст...', glb: 'GLB', back: 'В начало', thinking: 'Перевод...', error: 'Ошибка сети. Попробуйте снова.' }
        };

        function getLang() { return localStorage.getItem('glb_app_lang') || 'ja'; }

        function applyUI(lang) {
            var t = T[lang] || T.en;
            var el;
            if (el = document.getElementById('t-select-label')) el.textContent = t.selectLabel;
            if (el = document.getElementById('t-select-note')) el.textContent = t.selectNote;
            if (el = document.getElementById('t-start-btn')) el.textContent = t.start;
            if (el = document.getElementById('t-main-desc')) el.textContent = t.mainDesc;
            if (el = document.getElementById('input-text')) el.placeholder = t.placeholder;
            if (el = document.getElementById('t-glb-btn')) el.textContent = t.glb;
            if (el = document.getElementById('t-back-btn')) el.textContent = t.back;
        }

        function fillLangSelects() {
            var from = document.getElementById('lang-from');
            var to = document.getElementById('lang-to');
            from.innerHTML = LANG_LIST.map(function (x) { return '<option value="' + x.v + '">' + x.n + '</option>'; }).join('');
            to.innerHTML = LANG_LIST.map(function (x) { return '<option value="' + x.v + '">' + x.n + '</option>'; }).join('');
            from.value = 'ja';
            to.value = 'en';
        }

        function tapStart() {
            var lang = document.getElementById('opening-lang').value;
            localStorage.setItem('glb_app_lang', lang);
            applyUI(lang);
            fillLangSelects();
            document.getElementById('view-start').classList.remove('active');
            document.getElementById('view-main').classList.add('active');
        }

        var FALLBACK = { 'ja|en': { 'おはよう': 'Good morning', 'おやすみ': 'Good night', 'ありがとう': 'Thank you', 'こんにちは': 'Hello', 'さようなら': 'Goodbye' }, 'en|ja': { 'Good morning': 'おはよう', 'Good night': 'おやすみ', 'Thank you': 'ありがとう', 'Hello': 'こんにちは', 'Goodbye': 'さようなら' }, 'ja|fr': { 'おはよう': 'Bonjour', 'おやすみ': 'Bonne nuit', 'ありがとう': 'Merci', 'こんにちは': 'Bonjour' }, 'fr|ja': { 'Bonjour': 'こんにちは', 'Bonne nuit': 'おやすみ', 'Merci': 'ありがとう' } };

        function doGLB() {
            var text = document.getElementById('input-text').value.trim();
            var from = document.getElementById('lang-from').value;
            var to = document.getElementById('lang-to').value;
            var resultArea = document.getElementById('result-area');
            var t = T[getLang()] || T.en;
            if (!text) return;
            resultArea.textContent = t.thinking;
            var pair = from + '|' + to;
            var key = text.toLowerCase();
            var fallback = FALLBACK[pair] && (FALLBACK[pair][text] || FALLBACK[pair][key]);
            if (fallback) {
                resultArea.innerHTML = '<strong>' + fallback + '</strong>';
                return;
            }
            var url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + from + '|' + to;
            fetch(url).then(function (r) { return r.json(); }).then(function (data) {
                if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
                    resultArea.innerHTML = '<strong>' + data.responseData.translatedText + '</strong>';
                } else {
                    resultArea.textContent = (data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
                }
            }).catch(function () {
                resultArea.innerHTML = '<span style="color:#c44;">' + t.error + '</span>';
            });
        }

        (function init() {
            fillLangSelects();
            var langSelect = document.getElementById('opening-lang');
            var saved = getLang();
            if (saved && langSelect.querySelector('option[value="' + saved + '"]')) langSelect.value = saved;
            applyUI(getLang());
            langSelect.addEventListener('change', function () {
                localStorage.setItem('glb_app_lang', langSelect.value);
                applyUI(langSelect.value);
            });
        })();
    </script>
</body>
</html>
