<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        body { background: #000; color: #FFD700; font-family: monospace; text-align: center; padding-top: 50px; }
        textarea { width: 80%; height: 150px; background: #111; border: 2px solid #FFD700; color: #FFD700; font-size: 1.2rem; border-radius: 10px; padding: 10px; }
        .glb-btn { width: 150px; height: 150px; background: url('icon.png') no-repeat center; background-size: contain; border: none; cursor: pointer; margin: 20px; }
        #result { width: 80%; margin: 20px auto; padding: 20px; border-left: 5px solid #FFD700; background: #050505; color: #fff; font-size: 1.4rem; min-height: 50px; }
    </style>
</head>
<body>
    <h1>GLOBAL LANGUAGE BREAKER</h1>
    <textarea id="it" placeholder="日本語を入力..."></textarea><br>
    <button class="glb-btn" onclick="go()"></button>
    <div id="result">READY...</div>

    <script>
        // 親方の「理」と「器」をここに直接封印
        const DICT = {
            'おはよう': 'Good morning',
            'ありがとう': 'Thank you',
            '駅はどこですか': 'Where is the station?',
            '助けてください': 'Please help me',
            'チェックアウトをお願いします': 'I would like to check out.'
        };

        function go() {
            const text = document.getElementById('it').value.trim();
            const res = document.getElementById('result');
            if(!text) return;
            
            // 内部辞書だけで即答（通信不要・エラーなし・爆速）
            const hit = DICT[text];
            res.innerText = hit || "Translation pending (Dictionary only mode).";
        }
    </script>
</body>
</html>
