<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB TRAVEL - EXECUTION</title>
    <style>
        :root { --gold: #d6b25e; --bg: #0a0a0a; --card: #1a1a1a; --noir-red: #ff0000; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; text-align: center; }
        #noir-tv {
            width: 100%;
            min-height: 52px;
            background: #000;
            color: var(--noir-red);
            font-weight: 700;
            font-size: 13px;
            padding: 12px 16px;
            text-align: left;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgba(255,0,0,0.5);
            box-shadow: 0 0 20px rgba(255,0,0,0.15);
        }
        #noir-tv::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 3px);
            pointer-events: none;
        }
        #noir-tv::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,0,0,0.02);
            animation: noir-flicker 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes noir-flicker {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0.92; }
        }
        #noir-tv .live-tag { color: var(--noir-red); text-shadow: 0 0 8px var(--noir-red); margin-right: 8px; }
        #noir-tv .typing-text { display: inline; }
        #noir-tv .cursor { display: inline-block; width: 2px; height: 1em; background: var(--noir-red); animation: blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
        @keyframes blink { 50% { opacity: 0; } }
        .cockpit { padding: 20px; max-width: 480px; margin: 0 auto; }
        .header { margin-bottom: 24px; }
        .gold-text { color: var(--gold); letter-spacing: 4px; font-weight: bold; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none; box-sizing: border-box; }
        #result-area { min-height: 72px; padding: 14px; background: var(--card); border-radius: 10px; margin-bottom: 24px; text-align: left; line-height: 1.5; font-size: 15px; border: 1px solid #2a2a2a; }
        .btn { background: var(--gold); color: #000; padding: 16px; border-radius: 30px; font-weight: bold; text-decoration: none; display: block; margin: 10px 0; font-size: 16px; }
        .footer { margin-top: 32px; padding-top: 16px; font-size: 11px; color: #666; border-top: 1px solid #222; }
        .footer a { color: #888; margin: 0 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div id="noir-tv">
        <span class="live-tag">[ LIVE ]</span><span class="typing-text" id="noir-typing"></span><span class="cursor" id="noir-cursor"></span>
    </div>
    <div class="cockpit">
    <div class="header">
        <h1 class="gold-text">GLB TRAVEL</h1>
        <div style="font-size: 10px; color: #555;">v1.0.2603 | STELLA ADMIN</div>
    </div>

    <div style="max-width: 480px; margin: 0 auto 20px;">
        <p style="font-size: 13px; color: #f5e6b8; margin: 0 0 10px; line-height: 1.5;">
            ※150,000語のフル機能制限を解除して、生活動線を確保せよ
        </p>
        <a href="https://buy.stripe.com/fZuaEZ0oRgd25Vl96fasg00">
GLB PRO 有効化 ($4.99)
</a>
    </div>

    <input type="text" id="q" placeholder="150k辞書を爆速検索..." autocomplete="off">
    <div id="result-area">結果がここに表示されます</div>

    <div class="footer">
        <div style="margin-bottom: 15px;">
            <a href="https://nextbase-one-ha.github.io/Worldwide-/privacy.html">Privacy</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/terms.html">Terms</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/legal.html">Legal</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/support.html">Support</a>
        </div>
        © NEXT BASE. 「生活動線」開通。
    </div>
    </div>

    <script>
        const API_BASE_URL = localStorage.getItem('GLB_API_BASE_URL') || "https://glb-noir.onrender.com";
        
        const STELLA_BUS = {
            dict: new Map(),
            userDict: new Map(),
            lastTranslateTime: 0,
            cooldownMs: 5000,
            quota: { FREE: 0, PRO: 50 },
            async init() {
                try {
                    const res = await fetch('/dictionary/150k.csv');
                    const text = await res.text();
                    const lines = text.split('\n');
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const parts = line.split(',');
                        const s = parts[0] && parts[0].trim();
                        const t = parts[1] && parts[1].trim();
                        if (i > 0 && s && t) this.dict.set(s.toLowerCase(), t);
                    }
                    document.getElementById('result-area').innerText = "150,000語 装填完了。";
                } catch (e) {
                    document.getElementById('result-area').innerText = "辞書ロード失敗。パスを確認。";
                }
                const saved = localStorage.getItem('GLB_USER_DICT');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        Object.entries(data).forEach(([k, v]) => this.userDict.set(k.toLowerCase(), v));
                    } catch (e) {}
                }
            },
            getPlan() {
                const plan = localStorage.getItem('GLB_PLAN') || 'FREE';
                return plan === 'FREE' ? 'FREE' : 'PRO';
            },
            checkQuota() {
                const plan = this.getPlan();
                const used = parseInt(localStorage.getItem('GLB_QUOTA_USED') || '0', 10);
                return used < this.quota[plan];
            },
            useQuota() {
                const used = parseInt(localStorage.getItem('GLB_QUOTA_USED') || '0', 10);
                localStorage.setItem('GLB_QUOTA_USED', String(used + 1));
            },
            travelLogic(q) {
                const lower = q.toLowerCase().trim();
                const patterns = {
                    'where is the station': '駅はどこですか',
                    'lost passport': 'パスポートをなくしました',
                    'how much': 'いくらですか',
                    'thank you': 'ありがとうございます',
                    'excuse me': 'すみません'
                };
                return patterns[lower] || null;
            },
            async translateWithAPI(text) {
                if (text.length >= 200) {
                    return { error: '文字数が200文字を超えています' };
                }
                const now = Date.now();
                if (now - this.lastTranslateTime < this.cooldownMs) {
                    return { error: 'クールダウン中です。しばらくお待ちください。' };
                }
                if (!this.checkQuota()) {
                    return { error: 'クォータが上限に達しました。PROプランにアップグレードしてください。' };
                }
                try {
                    const plan = this.getPlan();
                    const res = await fetch(API_BASE_URL + '/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            text: text,
                            from_lang: 'en',
                            to_lang: 'ja',
                            plan: plan,
                            user_id: localStorage.getItem('GLB_USER_ID') || null
                        })
                    });
                    if (!res.ok) {
                        const errorData = await res.json().catch(() => ({ detail: 'API error' }));
                        throw new Error(errorData.detail || 'API error');
                    }
                    const data = await res.json();
                    this.lastTranslateTime = now;
                    this.useQuota();
                    // API側は result フィールドを返すが、GLB側は translation を期待
                    return { 
                        translation: data.result || '',
                        error: data.message || null,
                        source: data.source || 'ai',
                        used_ai: data.used_ai || false
                    };
                } catch (e) {
                    return { error: 'API接続エラー: ' + e.message };
                }
            },
            async search(q) {
                if (!q || !q.trim()) {
                    document.getElementById('result-area').innerHTML = '<span style="color:#666;">入力してください</span>';
                    return;
                }
                const lower = q.toLowerCase().trim();
                let result = null;
                let source = '';
                
                // 1. 150k辞書
                result = this.dict.get(lower);
                if (result) {
                    source = '150k辞書';
                } else {
                    // 2. 旅行ロジック
                    result = this.travelLogic(q);
                    if (result) {
                        source = '旅行ロジック';
                    } else {
                        // 3. ユーザー辞書
                        result = this.userDict.get(lower);
                        if (result) {
                            source = 'ユーザー辞書';
                        } else {
                            // 4. AI fallback
                            const apiResult = await this.translateWithAPI(q);
                            if (apiResult.translation) {
                                result = apiResult.translation;
                                source = 'AI翻訳';
                            } else if (apiResult.error) {
                                result = apiResult.error;
                                source = 'エラー';
                            }
                        }
                    }
                }
                
                const display = result 
                    ? `<strong>${result}</strong><br><span style="color:#666; font-size:12px;">[${source}]</span>` 
                    : '<span style="color:#666;">見つかりません</span>';
                document.getElementById('result-area').innerHTML = display;
            }
        };

        const input = document.getElementById('q');
        let debounceTimer = null;
        input.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                STELLA_BUS.search(e.target.value);
            }, 300);
        });
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(debounceTimer);
                STELLA_BUS.search(e.target.value);
            }
        });

        STELLA_BUS.init();

        (function initNoirTV() {
            const typingEl = document.getElementById('noir-typing');
            const cursorEl = document.getElementById('noir-cursor');
            const DEFAULT_PHRASE = 'ノワールテレビ、放送中。';
            let phrases = [DEFAULT_PHRASE];
            let phraseIndex = 0;
            let typingIndex = 0;
            let currentText = '';
            let timer = null;

            function typeNext() {
                if (!typingEl) return;
                currentText = phrases[phraseIndex % phrases.length] || DEFAULT_PHRASE;
                if (typingIndex >= currentText.length) {
                    typingIndex = 0;
                    phraseIndex++;
                    setTimeout(typeNext, 2200);
                    return;
                }
                typingEl.textContent = currentText.slice(0, typingIndex + 1);
                typingIndex++;
                timer = setTimeout(typeNext, 80 + Math.random() * 40);
            }

            function start() {
                typingIndex = 0;
                if (timer) clearTimeout(timer);
                typeNext();
            }

            fetch('/data/phrases.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(json => {
                    if (Array.isArray(json) && json.length) {
                        phrases = json.filter(x => typeof x === 'string' && x.trim().length > 0);
                        if (phrases.length === 0) phrases = [DEFAULT_PHRASE];
                    }
                    start();
                })
                .catch(() => { start(); });
        })();
    </script>
</body>
</html>
