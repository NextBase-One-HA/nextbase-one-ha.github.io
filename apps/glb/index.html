<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>GLB - NEXT BASE 瞬間翻訳</title>

<style>
:root{
  --gold:#d6b25e;
  --bg:#050505;
  --panel:#0f0f0f;
  --line:#222;
  --text:#f2f2f2;
  --muted:#9a9a9a;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  min-height:100%;
}

.container{
  max-width:720px;
  margin:0 auto;
  padding:28px 20px 56px;
}

.hero-title{
  text-align:center;
  color:var(--gold);
  font-size:clamp(28px,6vw,42px);
  font-weight:800;
  letter-spacing:.02em;
  margin:0 0 8px;
  text-shadow:0 2px 20px rgba(214,178,94,.3);
}

.hero-subtitle{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin:0 0 32px;
  letter-spacing:.08em;
}

.lang-toggle{
  display:flex;
  gap:12px;
  margin-bottom:24px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:4px;
}

.lang-toggle button{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:var(--muted);
  border-radius:8px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:all .2s ease;
}

.lang-toggle button.active{
  background:var(--gold);
  color:#000;
}

.card{
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
  border:1px solid var(--line);
  border-radius:22px;
  padding:28px;
  box-shadow:0 24px 60px rgba(0,0,0,.28);
  margin-bottom:20px;
}

.label{
  color:var(--gold);
  letter-spacing:.12em;
  font-weight:700;
  font-size:11px;
  margin-bottom:12px;
  text-transform:uppercase;
}

textarea{
  width:100%;
  min-height:140px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--text);
  padding:16px;
  font-size:16px;
  resize:vertical;
  font-family:inherit;
  line-height:1.6;
}

textarea:focus{
  outline:none;
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(214,178,94,.1);
}

button.btn-primary{
  width:100%;
  text-align:center;
  border-radius:12px;
  padding:18px 24px;
  margin-top:16px;
  font-weight:800;
  letter-spacing:.04em;
  transition:transform .15s ease, opacity .15s ease, background .15s ease;
  border:none;
  cursor:pointer;
  font-size:16px;
  background:var(--gold);
  color:#000;
}

button.btn-primary:hover{opacity:.92}
button.btn-primary:active{transform:scale(.985)}
button.btn-primary:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.status{
  margin-top:12px;
  font-size:12px;
  color:var(--muted);
  min-height:18px;
  text-align:center;
}

.answer{
  margin-top:18px;
  padding:20px;
  border-radius:12px;
  background:var(--panel);
  border:1px solid var(--line);
  white-space:pre-wrap;
  font-size:16px;
  line-height:1.8;
  min-height:80px;
}

.answer.empty{
  color:var(--muted);
  font-style:italic;
}

.upgrade-section{
  text-align:center;
  padding:24px;
  margin-top:24px;
}

.upgrade-section .label{
  margin-bottom:16px;
}

.upgrade-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.upgrade-buttons a{
  display:inline-block;
  padding:14px 28px;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
  transition:transform .15s ease, opacity .15s ease;
  letter-spacing:.04em;
}

.upgrade-buttons a:hover{
  opacity:.9;
  transform:translateY(-2px);
}

.btn-basic{
  background:var(--gold);
  color:#000;
}

.btn-traveler{
  background:transparent;
  color:var(--gold);
  border:2px solid var(--gold);
}

@media (max-width:640px){
  .container{padding:22px 16px 44px}
  .card{padding:22px}
  .upgrade-buttons{
    flex-direction:column;
  }
  .upgrade-buttons a{
    width:100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1 class="hero-title">GLB - NEXT BASE 瞬間翻訳</h1>
  <p class="hero-subtitle">15万語オフライン辞書 + AI翻訳</p>

  <div class="lang-toggle">
    <button id="lang-ja-en" class="active">日本語 → 英語</button>
    <button id="lang-en-ja">英語 → 日本語</button>
  </div>

  <div class="card">
    <div class="label">INPUT</div>
    <textarea id="user-input" placeholder="翻訳したい文章を入力してください..."></textarea>
    <button id="send-btn" class="btn-primary">翻訳</button>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <div class="label">REPLY</div>
    <div id="answer" class="answer empty">翻訳結果がここに表示されます...</div>
    
    <div class="upgrade-section">
      <div class="label">UPGRADE</div>
      <div class="upgrade-buttons">
        <a href="https://buy.stripe.com/dRm3cx7Rj8KA0B1gyHasg01" class="btn-basic">GET BASIC ($1.99)</a>
        <a href="https://buy.stripe.com/cNi8wR8Vn8KA4Rh82basg02" class="btn-traveler">GET TRAVELER ($7.99)</a>
      </div>
      <p style="margin-top:16px; font-size:12px; color:var(--muted);">アップグレードで Gemini Pro の高精度翻訳を解放</p>
    </div>
  </div>
</div>

<script>
// 言語設定
let currentLang = "ja-en"; // デフォルト: 日本語→英語

// 内蔵簡易翻訳テーブル（フォールバック用）
const fallbackDict = new Map([
  ["おはよう", "Good morning"],
  ["こんにちは", "Hello"],
  ["こんばんは", "Good evening"],
  ["ありがとう", "Thank you"],
  ["さようなら", "Goodbye"],
  ["hello", "こんにちは"],
  ["goodbye", "さようなら"],
  ["thank you", "ありがとう"],
  ["good morning", "おはよう"],
  ["good evening", "こんばんは"]
]);

// 150k辞書
let dict150k = null;
let dictLoaded = false;

// ユーザー辞書（空の辞書）- 端末に保存
let userDict = new Map();

// ユーザー辞書のロード（ローカルストレージから）
function loadUserDict() {
  try {
    const stored = localStorage.getItem("glb_user_dict");
    if (stored) {
      const data = JSON.parse(stored);
      userDict = new Map(data);
      console.log("User dictionary loaded:", userDict.size, "entries");
    }
  } catch (e) {
    console.warn("Failed to load user dictionary:", e);
  }
}

// ユーザー辞書に保存（端末にダウンロード・オンデバイス保存）
function saveToUserDict(source, target, fromLang, toLang) {
  try {
    const key = `${fromLang}-${toLang}:${source.trim().toLowerCase()}`;
    const wasNew = !userDict.has(key);
    userDict.set(key, target.trim());
    
    // オンデバイス（ローカルストレージ）に永続化
    const data = Array.from(userDict.entries());
    localStorage.setItem("glb_user_dict", JSON.stringify(data));
    
    // 保存成功をログに記録
    if (wasNew) {
      console.log(`[オンデバイス保存] "${source}" → "${target}" (${fromLang}→${toLang})`);
      console.log(`[ユーザー辞書] 現在のエントリ数: ${userDict.size}`);
    }
    
    // API経由でバックエンドにも送信（オプション・非同期）
    syncUserDictToAPI(source, target, fromLang, toLang).catch(e => {
      // API同期失敗は無視（オンデバイス保存は成功している）
      console.warn("API同期失敗（オンデバイス保存は成功）:", e);
    });
    
    return true;
  } catch (e) {
    console.error("オンデバイス保存失敗:", e);
    return false;
  }
}

// API経由でバックエンドに同期
async function syncUserDictToAPI(source, target, fromLang, toLang) {
  const API_SYNC_URL = "https://YOUR_BACKEND_ENDPOINT/api/user-dict";
  const API_KEY = "YOUR_REAL_AUTHORIZED_KEY";
  
  // APIが設定されていない場合はスキップ
  if (API_SYNC_URL === "https://YOUR_BACKEND_ENDPOINT/api/user-dict") {
    return;
  }
  
  try {
    await fetch(API_SYNC_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-KEY": API_KEY
      },
      body: JSON.stringify({
        source: source.trim(),
        target: target.trim(),
        from: fromLang,
        to: toLang,
        timestamp: Date.now()
      })
    });
  } catch (e) {
    console.warn("Failed to sync to API:", e);
  }
}

// 150k辞書のロード
async function load150kDict() {
  if (dictLoaded) return dict150k;
  
  try {
    const res = await fetch("../../dictionary/150k.csv");
    if (!res.ok) {
      console.warn("150k.csv not found, using fallback dictionary");
      dictLoaded = true;
      return null;
    }
    const text = await res.text();
    const map = new Map();
    const lines = text.split("\n");
    
    // ヘッダー行をスキップ
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const [source, target, from, to] = line.split(",");
      if (!source || !target) continue;
      
      // 言語ペアごとに保存
      const key = `${from}-${to}:${source.trim().toLowerCase()}`;
      map.set(key, target.trim());
    }
    
    dictLoaded = true;
    console.log("150k dictionary loaded:", map.size, "entries");
    return map;
  } catch (e) {
    console.warn("Failed to load 150k.csv:", e);
    dictLoaded = true;
    return null;
  }
}

// 辞書検索（優先順位: ユーザー辞書 → 150k辞書 → フォールバック）
function searchDict(query, fromLang, toLang) {
  const normalized = query.trim().toLowerCase();
  const key = `${fromLang}-${toLang}:${normalized}`;
  
  // 1. ユーザー辞書（空の辞書）を最優先で検索
  if (userDict.has(key)) {
    return userDict.get(key);
  }
  
  // 2. 150k辞書を検索
  if (dict150k) {
    const result = dict150k.get(key);
    if (result) return result;
  }
  
  // 3. フォールバック辞書を検索
  const fallbackKey = fromLang === "ja" ? normalized : normalized;
  const fallbackResult = fallbackDict.get(fallbackKey);
  if (fallbackResult) return fallbackResult;
  
  return null;
}

// 翻訳実行（必ず何かを返す）
async function translate(text, fromLang, toLang) {
  // 1. 辞書検索（ユーザー辞書 → 150k辞書 → フォールバック）
  const dictResult = searchDict(text, fromLang, toLang);
  if (dictResult) {
    // ユーザー辞書から見つかったかチェック
    const key = `${fromLang}-${toLang}:${text.trim().toLowerCase()}`;
    const source = userDict.has(key) ? "user_dict" : "150k_dict";
    return { reply: dictResult, source: source };
  }
  
  // 2. APIが設定されていればGemini経由
  const NE_GATEWAY_URL = "https://YOUR_BACKEND_ENDPOINT";
  const API_KEY = "YOUR_REAL_AUTHORIZED_KEY";
  
  if (NE_GATEWAY_URL !== "https://YOUR_BACKEND_ENDPOINT" && API_KEY !== "YOUR_REAL_AUTHORIZED_KEY") {
    try {
      const response = await fetch(NE_GATEWAY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-API-KEY": API_KEY
        },
        body: JSON.stringify({ prompt: text, mode: "low_cost_0.08", from: fromLang, to: toLang })
      });
      
      if (response.ok) {
        const data = await response.json();
        if (data && data.reply) {
          // API（Gemini）から返ってきた翻訳を確実にオンデバイス辞書に保存
          const saved = saveToUserDict(text, data.reply, fromLang, toLang);
          if (saved) {
            console.log(`[API翻訳→オンデバイス保存完了] "${text}" → "${data.reply}"`);
          }
          return { reply: data.reply, source: "gemini", savedToDevice: saved };
        }
      }
    } catch (e) {
      console.warn("API error:", e);
    }
  }
  
  // 3. フォールバック: 簡易メッセージ
  if (fromLang === "ja") {
    return { reply: `[翻訳準備中] "${text}" の英語翻訳を準備しています。アップグレードで高精度翻訳を解放できます。`, source: "fallback" };
  } else {
    return { reply: `[翻訳準備中] "${text}" の日本語翻訳を準備しています。アップグレードで高精度翻訳を解放できます。`, source: "fallback" };
  }
}

// UI要素
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const statusEl = document.getElementById("status");
const answerEl = document.getElementById("answer");
const langJaEn = document.getElementById("lang-ja-en");
const langEnJa = document.getElementById("lang-en-ja");

// 言語切り替え
langJaEn.addEventListener("click", () => {
  currentLang = "ja-en";
  langJaEn.classList.add("active");
  langEnJa.classList.remove("active");
  inputEl.placeholder = "翻訳したい日本語を入力してください...";
});

langEnJa.addEventListener("click", () => {
  currentLang = "en-ja";
  langJaEn.classList.remove("active");
  langEnJa.classList.add("active");
  inputEl.placeholder = "Enter text to translate...";
});

// 送信処理
async function handleSend() {
  const text = (inputEl.value || "").trim();
  if (!text) return;

  sendBtn.disabled = true;
  statusEl.textContent = "翻訳中...";
  answerEl.classList.add("empty");
  answerEl.textContent = "";

  try {
    const [fromLang, toLang] = currentLang === "ja-en" ? ["ja", "en"] : ["en", "ja"];
    const result = await translate(text, fromLang, toLang);
    
    answerEl.textContent = result.reply;
    answerEl.classList.remove("empty");
    
    // 翻訳結果をユーザー辞書に保存（150k辞書やフォールバックから取得した場合も）
    if (result.source === "150k_dict" || result.source === "fallback") {
      saveToUserDict(text, result.reply, fromLang, toLang);
    }
    
    // API（Gemini）からの翻訳結果をオンデバイス辞書に保存
    if (result.source === "gemini" && result.savedToDevice) {
      // 既に保存済み（translate関数内で保存）
      console.log("[オンデバイス保存確認] API翻訳結果を端末に保存しました");
    } else if (result.source === "150k_dict" || result.source === "fallback") {
      // 150k辞書やフォールバックからの結果も保存（次回から最優先）
      saveToUserDict(text, result.reply, fromLang, toLang);
    }
    
    const sourceNames = {
      "user_dict": "あなたの辞書（オンデバイス）",
      "150k_dict": "オフライン辞書",
      "gemini": "Gemini AI → オンデバイス保存済み",
      "fallback": "準備中"
    };
    statusEl.textContent = `✓ ${sourceNames[result.source] || "翻訳完了"}`;
  } catch (err) {
    console.error(err);
    answerEl.textContent = "エラーが発生しました。もう一度お試しください。";
    answerEl.classList.remove("empty");
    statusEl.textContent = "エラー";
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    handleSend();
  }
});

// 初期化: ユーザー辞書（オンデバイス）と150k辞書をロード
loadUserDict();
load150kDict().then(map => {
  dict150k = map;
  if (map) {
    const userCount = userDict.size;
    if (userCount > 0) {
      statusEl.textContent = `✓ 15万語辞書 + あなたの辞書(${userCount}語・オンデバイス)を読み込みました`;
      console.log(`[オンデバイス辞書] ${userCount}語の翻訳履歴を読み込みました`);
    } else {
      statusEl.textContent = "✓ 15万語辞書を読み込みました";
    }
  } else {
    const userCount = userDict.size;
    if (userCount > 0) {
      statusEl.textContent = `簡易辞書モード + あなたの辞書(${userCount}語・オンデバイス)`;
      console.log(`[オンデバイス辞書] ${userCount}語の翻訳履歴を読み込みました`);
    } else {
      statusEl.textContent = "簡易辞書モード";
    }
  }
});
</script>

</body>
</html>
