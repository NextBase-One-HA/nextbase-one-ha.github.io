<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB TRAVEL - EXECUTION</title>
    <style>
        :root { --gold: #d6b25e; --bg: #0a0a0a; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { margin-bottom: 30px; }
        .gold-text { color: var(--gold); letter-spacing: 4px; font-weight: bold; }
        input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); background: #222; color: #fff; font-size: 18px; margin-bottom: 20px; outline: none; }
        #momoriri-ticker {
            width: 90%;
            margin: 0 auto 12px;
            padding: 8px 12px;
            background: #000;
            color: #ff0000;
            font-weight: 700;
            font-size: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,0,0,0.6);
            text-align: left;
            letter-spacing: 1px;
            text-shadow: 0 0 4px rgba(255,0,0,0.7);
            position: relative;
            overflow: hidden;
        }
        #momoriri-ticker::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(transparent 0 2px, rgba(255,255,255,0.06) 2px 3px);
            mix-blend-mode: screen;
            opacity: 0.5;
            pointer-events: none;
        }
        #result-area { min-height: 80px; padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 30px; text-align: left; line-height: 1.6; }
        .btn { background: var(--gold); color: #000; padding: 16px; border-radius: 30px; font-weight: bold; text-decoration: none; display: block; margin: 10px 0; font-size: 16px; }
        .footer { margin-top: 40px; font-size: 11px; color: #666; }
        .footer a { color: #888; margin: 0 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="gold-text">GLB TRAVEL</h1>
        <div style="font-size: 10px; color: #555;">v1.0.2603 | STELLA ADMIN</div>
    </div>

    <input type="text" id="q" placeholder="150k辞書を爆速検索..." autocomplete="off">
    <div id="momoriri-ticker">（ momoriri 待機中... ）</div>
    <div id="result-area">結果がここに表示されます</div>

    <div class="billing">
        <a href="https://buy.stripe.com/dRm3cx7Rj8KA0B1gyHasg01" class="btn">BASIC 有効化 ($1.99)</a>
        <a href="https://buy.stripe.com/cNi8wR8Vn8KA4Rh82basg02" class="btn">TRAVELER 有効化 ($7.99)</a>
    </div>

    <div class="footer">
        <div style="margin-bottom: 15px;">
            <a href="../../privacy.html">Privacy</a>
            <a href="../../terms.html">Terms</a>
            <a href="../../legal.html">Legal</a>
            <a href="../../support.html">Support</a>
        </div>
        © NEXT BASE. 「生活動線」開通。
    </div>

    <script>
        const STELLA_BUS = {
            dict: new Map(),
            async init() {
                try {
                    const res = await fetch('/dictionary/150k.csv');
                    const text = await res.text();
                    const lines = text.split('\n');
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const parts = line.split(',');
                        const s = parts[0] && parts[0].trim();
                        const t = parts[1] && parts[1].trim();
                        if (i > 0 && s && t) this.dict.set(s.toLowerCase(), t);
                    }
                    document.getElementById('result-area').innerText = "150,000語 装填完了。";
                } catch (e) {
                    document.getElementById('result-area').innerText = "辞書ロード失敗。パスを確認。";
                }
            },
            search(q) {
                const res = this.dict.get(q.toLowerCase().trim());
                document.getElementById('result-area').innerHTML = res 
                    ? `<strong>${res}</strong>` 
                    : `<span style="color:#666;">見つかりません（NEゲートウェイ接続推奨）</span>`;
            }
        };

        const input = document.getElementById('q');
        input.addEventListener('input', (e) => STELLA_BUS.search(e.target.value));

        STELLA_BUS.init();

        // momoriri ノワールテレビ: ライブ受信 ticker
        (function initMomoririTicker() {
            const el = document.getElementById('momoriri-ticker');
            if (!el) return;
            let phrases = [];
            let index = 0;

            async function loadPhrases() {
                try {
                    const res = await fetch('/data/phrases.json', { cache: 'no-store' });
                    if (!res.ok) throw new Error('status ' + res.status);
                    const json = await res.json();
                    if (Array.isArray(json) && json.length) {
                        phrases = json.filter(x => typeof x === 'string' && x.trim().length > 0);
                        if (phrases.length === 0) {
                            el.textContent = '（ momoriri 待機中... ）';
                        }
                    } else {
                        el.textContent = '（ momoriri 待機中... ）';
                    }
                } catch (e) {
                    el.textContent = '（ momoriri 待機中... ）';
                }
            }

            function tick() {
                if (!phrases.length) {
                    el.textContent = '（ momoriri 待機中... ）';
                    return;
                }
                const p = phrases[index % phrases.length];
                index++;
                el.textContent = p;
            }

            loadPhrases();
            setInterval(tick, 3000);
            // 失敗しても止めず、バックグラウンドで定期的にリロード
            setInterval(loadPhrases, 30000);
        })();
    </script>
</body>
</html>
