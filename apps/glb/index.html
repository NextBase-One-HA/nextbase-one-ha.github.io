<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB TRAVEL - EXECUTION</title>
    <style>
        :root { --gold: #d6b25e; --bg: #0a0a0a; --card: #1a1a1a; --noir-red: #ff0000; }
        body { 
            background: var(--bg) url('/glb-hero.jpg') center/cover no-repeat fixed; 
            background-blend-mode: overlay;
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
            min-height: 100vh;
        }
        #noir-tv {
            width: 100%;
            min-height: 52px;
            background: #000;
            color: var(--noir-red);
            font-weight: 700;
            font-size: 13px;
            padding: 12px 16px;
            text-align: left;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid rgba(255,0,0,0.5);
            box-shadow: 0 0 20px rgba(255,0,0,0.15);
        }
        #noir-tv::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 3px);
            pointer-events: none;
        }
        #noir-tv::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,0,0,0.02);
            animation: noir-flicker 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes noir-flicker {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0.92; }
        }
        #noir-tv .live-tag { color: var(--noir-red); text-shadow: 0 0 8px var(--noir-red); margin-right: 8px; }
        #noir-tv .typing-text { display: inline; }
        #noir-tv .cursor { display: inline-block; width: 2px; height: 1em; background: var(--noir-red); animation: blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
        @keyframes blink { 50% { opacity: 0; } }
        .cockpit { padding: 20px; max-width: 480px; margin: 0 auto; }
        .header { margin-bottom: 24px; }
        .gold-text { color: var(--gold); letter-spacing: 4px; font-weight: bold; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none; box-sizing: border-box; }
        #result-area { min-height: 72px; padding: 14px; background: var(--card); border-radius: 10px; margin-bottom: 24px; text-align: left; line-height: 1.5; font-size: 15px; border: 1px solid #2a2a2a; }
        .btn { background: var(--gold); color: #000; padding: 16px; border-radius: 30px; font-weight: bold; text-decoration: none; display: block; margin: 10px 0; font-size: 16px; }
        .situation-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .situation-btn { background: var(--card); border: 1px solid var(--gold); color: #fff; padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .situation-btn:hover { background: var(--gold); color: #000; }
        .situation-btn:active { transform: scale(0.95); }
        .share-btn { background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; border: 1px solid var(--gold); margin-top: 10px; }
        .share-btn:hover { background: var(--gold); color: #000; }
        .situation-display { background: var(--card); padding: 16px; border-radius: 10px; margin-bottom: 16px; border-left: 4px solid var(--gold); }
        .situation-display h3 { color: var(--gold); margin: 0 0 8px 0; font-size: 14px; }
        .situation-display p { margin: 4px 0; font-size: 15px; }
        .action-steps { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
        .action-steps ol { margin: 8px 0; padding-left: 20px; text-align: left; }
        .action-steps li { margin: 4px 0; font-size: 14px; color: #ccc; }
        .footer { margin-top: 32px; padding-top: 16px; font-size: 11px; color: #666; border-top: 1px solid #222; }
        .footer a { color: #888; margin: 0 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div id="noir-tv">
        <span class="live-tag">[ LIVE ]</span><span class="typing-text" id="noir-typing"></span><span class="cursor" id="noir-cursor"></span>
    </div>
    <div class="cockpit">
    <div class="header">
        <h1 class="gold-text">GLB TRAVEL</h1>
        <div style="font-size: 10px; color: #555;">v1.0.2603 | STELLA ADMIN</div>
    </div>

    <div style="max-width: 480px; margin: 0 auto 20px;">
        <p style="font-size: 13px; color: #f5e6b8; margin: 0 0 10px; line-height: 1.5;">
            More than a translator. Confidence in travel situations.
        </p>
        <a href="https://buy.stripe.com/fZuaEZ0oRgd25Vl96fasg00" class="btn">
GLB PRO ($4.99)
</a>
    </div>

    <div id="situation-buttons" class="situation-buttons" style="display: none;">
        <button class="situation-btn" data-situation="airport">✈ Airport</button>
        <button class="situation-btn" data-situation="taxi">🚕 Taxi</button>
        <button class="situation-btn" data-situation="restaurant">🍴 Restaurant</button>
        <button class="situation-btn" data-situation="hotel">🏨 Hotel</button>
        <button class="situation-btn" data-situation="passport">🪪 Passport</button>
        <button class="situation-btn" data-situation="emergency">🚑 Emergency</button>
    </div>

    <input type="text" id="q" placeholder="Type or select situation..." autocomplete="off">
    <div id="result-area">Select a situation or type to search...</div>
    <div id="share-area" style="display: none;"></div>

    <div class="footer">
        <div style="margin-bottom: 15px;">
            <a href="https://nextbase-one-ha.github.io/Worldwide-/privacy.html">Privacy</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/terms.html">Terms</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/legal.html">Legal</a>
            <a href="https://nextbase-one-ha.github.io/Worldwide-/support.html">Support</a>
        </div>
        © NEXT BASE. 「生活動線」開通。
    </div>
    </div>

    <script>
        const API_BASE_URL = "https://craps-flights-bargain-bunny.trycloudflare.com";

        
        // Situation Data (translation！ + action)
        const SITUATION_DATA = {
            passport: {
                situation: "Lost passport",
                translation: "I lost my passport.",
                action: [
                    "Go to the nearest police station.",
                    "Ask for a report.",
                    "Contact your embassy."
                ]
            },
            taxi: {
                situation: "Taxi problem",
                translation: "Please take the shortest route. Show the map.",
                action: [
                    "Confirm the price before getting in.",
                    "Use official taxis when possible.",
                    "Show your destination on the map."
                ]
            },
            restaurant: {
                situation: "Restaurant",
                translation: "I have a food allergy. What do you recommend?",
                action: [
                    "Tell the waiter about allergies.",
                    "Ask about ingredients.",
                    "Tip is usually 10-20%."
                ]
            },
            hotel: {
                situation: "Hotel check-in",
                translation: "I have a reservation. Could you tell me the Wi-Fi password?",
                action: [
                    "Show your reservation confirmation.",
                    "Ask about check-out time.",
                    "Request room service if needed."
                ]
            },
            airport: {
                situation: "Airport",
                translation: "Where is the boarding gate? My luggage is missing.",
                action: [
                    "Check your boarding pass for gate number.",
                    "Report missing luggage immediately.",
                    "Keep your passport and ticket ready."
                ]
            },
            emergency: {
                situation: "Emergency",
                translation: "I need help. I need a doctor.",
                action: [
                    "Call local emergency number (112 in EU, 911 in US).",
                    "Go to nearest hospital or police station.",
                    "Contact your embassy if needed."
                ]
            }
        };
        
        const STELLA_BUS = {
            dict: new Map(),
            userDict: new Map(),
            lastTranslateTime: 0,
            cooldownMs: 5000,
            quota: { FREE: 0, PRO: 50 },
            async init() {
                // Check URL parameter for situation
                const params = new URLSearchParams(window.location.search);
                const situationParam = params.get('s');
                if (situationParam && SITUATION_DATA[situationParam]) {
                    this.loadSituation(situationParam);
                    return;
                }
                
                // Show situation buttons
                document.getElementById('situation-buttons').style.display = 'grid';
                
                try {
                    const res = await fetch('/dictionary/150k.csv');
                    const text = await res.text();
                    const lines = text.split('\n');
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const parts = line.split(',');
                        const s = parts[0] && parts[0].trim();
                        const t = parts[1] && parts[1].trim();
                        if (i > 0 && s && t) this.dict.set(s.toLowerCase(), t);
                    }
                } catch (e) {
                    console.error('Dictionary load error:', e);
                }
                const saved = localStorage.getItem('GLB_USER_DICT');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        Object.entries(data).forEach(([k, v]) => this.userDict.set(k.toLowerCase(), v));
                    } catch (e) {}
                }
            },
            loadSituation(situationKey) {
                const data = SITUATION_DATA[situationKey];
                if (!data) return;
                
                const situationUrl = `${window.location.origin}${window.location.pathname}?s=${situationKey}`;
                const shareText = `This helped me when I had a ${data.situation.toLowerCase()} problem while traveling.\n\n${situationUrl}`;
                
                const display = `
                    <div class="situation-display">
                        <h3>Situation</h3>
                        <p><strong>${data.situation}</strong></p>
                        <h3>Translation</h3>
                        <p>${data.translation}</p>
                        <div class="action-steps">
                            <h3>Action</h3>
                            <ol>
                                ${data.action.map(step => `<li>${step}</li>`).join('')}
                            </ol>
                        </div>
                    </div>
                    <button class="share-btn" onclick="navigator.clipboard.writeText('${shareText.replace(/'/g, "\\'")}').then(() => alert('Link copied! Share it with friends.'))">
                        📤 Share this situation
                    </button>
                `;
                
                document.getElementById('result-area').innerHTML = display;
                document.getElementById('share-area').innerHTML = '';
                document.getElementById('situation-buttons').style.display = 'none';
            },
            getPlan() {
                const plan = localStorage.getItem('GLB_PLAN') || 'FREE';
                return plan === 'FREE' ? 'FREE' : 'PRO';
            },
            checkQuota() {
                const plan = this.getPlan();
                const used = parseInt(localStorage.getItem('GLB_QUOTA_USED') || '0', 10);
                return used < this.quota[plan];
            },
            useQuota() {
                const used = parseInt(localStorage.getItem('GLB_QUOTA_USED') || '0', 10);
                localStorage.setItem('GLB_QUOTA_USED', String(used + 1));
            },
            // 旅行ロジックはAPI側に一本化（削除）
            // travelLogic() は API側の40パターンを使用
            async translateWithAPI(text) {
                if (text.length >= 200) {
                    return { error: '文字数が200文字を超えています' };
                }
                const now = Date.now();
                if (now - this.lastTranslateTime < this.cooldownMs) {
                    return { error: 'クールダウン中です。しばらくお待ちください。' };
                }
                if (!this.checkQuota()) {
                    return { error: 'クォータが上限に達しました。PROプランにアップグレードしてください。' };
                }
                try {
                    const plan = this.getPlan();
                    const res = await fetch(API_BASE_URL + '/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            text: text,
                            from_lang: 'en',
                            to_lang: 'ja',
                            plan: plan,
                            user_id: localStorage.getItem('GLB_USER_ID') || null
                        })
                    });
                    if (!res.ok) {
                        const errorData = await res.json().catch(() => ({ detail: 'API error' }));
                        throw new Error(errorData.detail || 'API error');
                    }
                    const data = await res.json();
                    this.lastTranslateTime = now;
                    this.useQuota();
                    // API側は result フィールドを返すが、GLB側は translation を期待
                    return { 
                        translation: data.result || '',
                        error: data.message || null,
                        source: data.source || 'ai',
                        used_ai: data.used_ai || false
                    };
                } catch (e) {
                    return { error: 'API接続エラー: ' + e.message };
                }
            },
            async search(q) {
                if (!q || !q.trim()) {
                    document.getElementById('result-area').innerHTML = '<span style="color:#666;">入力してください</span>';
                    return;
                }
                const lower = q.toLowerCase().trim();
                let result = null;
                let source = '';
                
                // 1. 150k辞書
                result = this.dict.get(lower);
                if (result) {
                    source = '150k辞書';
                } else {
                    // 2. ユーザー辞書
                    result = this.userDict.get(lower);
                    if (result) {
                        source = 'ユーザー辞書';
                    } else {
                        // 3. API fallback (旅行ロジック + AI翻訳を含む)
                        const apiResult = await this.translateWithAPI(q);
                        if (apiResult.translation) {
                            result = apiResult.translation;
                            // API側のsourceに基づいて表示
                            if (apiResult.source === 'travel_logic') {
                                source = '旅行ロジック';
                            } else if (apiResult.source === 'ai') {
                                source = 'AI翻訳';
                            } else {
                                source = 'API翻訳';
                            }
                        } else if (apiResult.error) {
                            result = apiResult.error;
                            source = 'エラー';
                        }
                    }
                }
                
                // Format display with Situation + Translation + Action style for screenshot
                let display = '';
                if (result) {
                    if (source === '旅行ロジック' || source === 'travel_logic') {
                        // Format for screenshot sharing
                        display = `
                            <div class="situation-display">
                                <h3>Situation</h3>
                                <p><strong>${q}</strong></p>
                                <h3>Translation</h3>
                                <p>${result}</p>
                            </div>
                        `;
                    } else {
                        display = `<strong>${result}</strong><br><span style="color:#666; font-size:12px;">[${source}]</span>`;
                    }
                    
                    // Add share button
                    const shareText = `This helped me while traveling.\n\n${window.location.href}`;
                    display += `
                        <button class="share-btn" onclick="navigator.clipboard.writeText('${shareText.replace(/'/g, "\\'")}').then(() => alert('Link copied! Share it with friends.'))">
                            📤 Share
                        </button>
                    `;
                } else {
                    display = '<span style="color:#666;">No result found. Try another phrase or upgrade for AI assist.</span>';
                }
                document.getElementById('result-area').innerHTML = display;
            }
        };
        
        // Situation button handlers
        document.querySelectorAll('.situation-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const situation = e.target.dataset.situation;
                if (SITUATION_DATA[situation]) {
                    STELLA_BUS.loadSituation(situation);
                    // Update URL
                    window.history.pushState({}, '', `?s=${situation}`);
                }
            });
        });

        const input = document.getElementById('q');
        let debounceTimer = null;
        input.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                STELLA_BUS.search(e.target.value);
            }, 300);
        });
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(debounceTimer);
                STELLA_BUS.search(e.target.value);
            }
        });

        STELLA_BUS.init();

        (function initNoirTV() {
            const typingEl = document.getElementById('noir-typing');
            const cursorEl = document.getElementById('noir-cursor');
            const DEFAULT_PHRASE = 'ノワールテレビ、放送中。';
            let phrases = [DEFAULT_PHRASE];
            let phraseIndex = 0;
            let typingIndex = 0;
            let currentText = '';
            let timer = null;

            function typeNext() {
                if (!typingEl) return;
                currentText = phrases[phraseIndex % phrases.length] || DEFAULT_PHRASE;
                if (typingIndex >= currentText.length) {
                    typingIndex = 0;
                    phraseIndex++;
                    setTimeout(typeNext, 2200);
                    return;
                }
                typingEl.textContent = currentText.slice(0, typingIndex + 1);
                typingIndex++;
                timer = setTimeout(typeNext, 80 + Math.random() * 40);
            }

            function start() {
                typingIndex = 0;
                if (timer) clearTimeout(timer);
                typeNext();
            }

            fetch('/data/phrases.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(json => {
                    if (Array.isArray(json) && json.length) {
                        phrases = json.filter(x => typeof x === 'string' && x.trim().length > 0);
                        if (phrases.length === 0) phrases = [DEFAULT_PHRASE];
                    }
                    start();
                })
                .catch(() => { start(); });
        })();
    </script>
</body>
</html>
