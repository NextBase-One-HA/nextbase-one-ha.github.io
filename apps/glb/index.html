<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        /* 深淵な黒 (#050505) と洗練されたディープ・ゴールド (#C5A059) の融合 */
        body { background: #050505; color: #C5A059; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .header { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.4rem; margin-bottom: 2rem; text-align: center; text-transform: uppercase; text-shadow: 0 0 10px rgba(197, 160, 89, 0.4); }
        
        /* 入力エリア：ディープ・ゴールド (#C5A059) の境界とテキスト */
        .input-box { 
            width: 85%; max-width: 480px; height: 140px; background: #111; border: 2px solid #C5A059; 
            padding: 1.2rem; color: #C5A059; font-size: 1.5rem; border-radius: 15px; outline: none; text-align: center;
        }

        /* 翻訳実行ボタン（ここに親方のロゴ icon.png が重なる） */
        .glb-execute-btn {
            width: 190px; height: 190px; margin: 2.5rem 0;
            background: #191970 url('icon.png') no-repeat center; /* ミッドナイト・ブルー背景 */
            background-size: contain;
            border: 4px solid #C5A059; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .glb-execute-btn:active { transform: scale(0.94); box-shadow: 0 0 10px #C5A059; }
        .glb-execute-btn span { font-size: 2rem; font-weight: 900; color: #C5A059; text-shadow: 0 0 5px #000; }

        /* 結果表示エリア：純白 (#FFF) のテキスト */
        .result-box { 
            width: 85%; max-width: 480px; min-height: 100px; padding: 1.2rem;
            border-left: 5px solid #C5A059; background: rgba(197, 160, 89, 0.05);
            color: #FFF; font-size: 1.4rem; text-align: left;
        }
    </style>
</head>
<body>
    <div class="header">GLOBAL LANGUAGE BREAKER</div>
    
    <textarea class="input-box" id="it" placeholder="INPUT JAPANESE..."></textarea>
    
    <button class="glb-execute-btn" onclick="exec()">
        <span>GLB</span> </button>
    
    <div class="result-box" id="res">READY...</div>

    <script>
        // 親方の知恵を封印した無限辞書
        const DICT = {
            'おはようございます': 'Good morning',
            'ありがとう': 'Thank you',
            '駅はどこですか': 'Where is the station?',
            'トイレはどこですか': 'Where is the restroom?',
            '助けてください': 'Please help me',
            'チェックアウトをお願いします': 'I would like to check out.'
        };

        function exec() {
            const val = document.getElementById('it').value.trim();
            const resArea = document.getElementById('res');
            if(!val) return;

            resArea.style.color = "#C5A059";
            resArea.innerText = "TRANSLATING...";

            // 通信なし・爆速判定
            setTimeout(() => {
                const hit = DICT[val];
                resArea.style.color = "#FFF";
                resArea.innerText = hit || "PENDING CLOUD SYNC (API REQUIRED)";
            }, 400);
        }
    </script>
</body>
</html>
