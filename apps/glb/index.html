<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>GLB v1.0 - NEXT BASE | 瞬間翻訳兵器</title>

<style>
:root{
  --gold:#D4AF37;
  --gold-glow:rgba(212,175,55,.4);
  --bg:#000000;
  --bg-gradient:linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #050505 100%);
  --panel:rgba(15,15,15,.95);
  --panel-border:rgba(212,175,55,.2);
  --line:#1a1a1a;
  --text:#f5f5f5;
  --text-bright:#ffffff;
  --muted:#888888;
  --success:#4ade80;
  --error:#ef4444;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  background-image:var(--bg-gradient);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:radial-gradient(circle at 20% 50%, rgba(212,175,55,.03) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(212,175,55,.02) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:24px 20px 64px;
  position:relative;
  z-index:1;
}

.hero-section{
  text-align:center;
  margin-bottom:32px;
  padding:20px 0;
}

.hero-title{
  color:var(--gold);
  font-size:clamp(28px,6vw,48px);
  font-weight:900;
  letter-spacing:-.02em;
  margin:0 0 8px;
  text-shadow:0 0 30px var(--gold-glow),
              0 4px 20px rgba(0,0,0,.5);
  background:linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero-subtitle{
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  letter-spacing:.12em;
  margin:0;
  text-transform:uppercase;
}

.lang-selector{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:18px;
  padding:8px;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}

.lang-selector select{
  flex:1;
  padding:14px 16px;
  border:none;
  background:rgba(0,0,0,.4);
  color:var(--text-bright);
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  outline:none;
  transition:all .3s;
}

.lang-selector select:focus{
  background:rgba(0,0,0,.6);
  box-shadow:0 0 0 2px var(--gold-glow);
}

.swap-btn{
  width:44px;
  height:44px;
  border-radius:12px;
  border:2px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s;
  flex-shrink:0;
}

.swap-btn:hover{
  background:var(--gold);
  color:#000;
  transform:rotate(180deg);
}

.swap-btn svg{
  width:20px;
  height:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:24px;
  padding:28px;
  margin-bottom:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.5),
             0 0 0 1px rgba(212,175,55,.1);
  transition:all .3s ease;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0;
  transition:opacity .3s;
}

.card:hover::before{
  opacity:1;
}

.label{
  color:var(--gold);
  letter-spacing:.15em;
  font-weight:800;
  font-size:11px;
  margin-bottom:12px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}

.label::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--gold), transparent);
  opacity:.3;
}

.input-wrapper{
  position:relative;
}

textarea{
  width:100%;
  min-height:160px;
  border-radius:16px;
  border:2px solid var(--line);
  background:rgba(0,0,0,.4);
  color:var(--text-bright);
  padding:20px 60px 20px 20px;
  font-size:16px;
  line-height:1.7;
  resize:vertical;
  font-family:inherit;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter:blur(10px);
}

textarea:focus{
  outline:none;
  border-color:var(--gold);
  background:rgba(0,0,0,.6);
  box-shadow:0 0 0 4px var(--gold-glow),
             0 8px 32px rgba(212,175,55,.2),
             inset 0 0 20px rgba(212,175,55,.05);
  transform:translateY(-2px);
}

textarea::placeholder{
  color:var(--muted);
  opacity:.6;
}

.input-actions{
  position:absolute;
  top:12px;
  right:12px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:36px;
  height:36px;
  border-radius:10px;
  border:none;
  background:rgba(212,175,55,.15);
  color:var(--gold);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s;
  backdrop-filter:blur(10px);
}

.icon-btn:hover{
  background:var(--gold);
  color:#000;
  transform:scale(1.1);
}

.icon-btn:active{
  transform:scale(.95);
}

.icon-btn.active{
  background:var(--error);
  color:#fff;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%, 100%{ opacity:1; }
  50%{ opacity:.7; }
}

.icon-btn svg{
  width:18px;
  height:18px;
}

button.btn-primary{
  width:100%;
  text-align:center;
  border-radius:16px;
  padding:20px 32px;
  margin-top:16px;
  font-weight:800;
  letter-spacing:.08em;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  border:none;
  cursor:pointer;
  font-size:16px;
  background:linear-gradient(135deg, var(--gold) 0%, #FFD700 100%);
  color:#000;
  box-shadow:0 8px 24px rgba(212,175,55,.3),
             0 0 0 1px rgba(212,175,55,.2);
  position:relative;
  overflow:hidden;
  text-transform:uppercase;
}

button.btn-primary::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  transform:translate(-50%, -50%);
  transition:width .6s, height .6s;
}

button.btn-primary:hover::before{
  width:300px;
  height:300px;
}

button.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(212,175,55,.4),
             0 0 0 1px rgba(212,175,55,.3);
}

button.btn-primary:active{
  transform:translateY(0);
}

button.btn-primary:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

.status{
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
  min-height:20px;
  text-align:center;
  font-weight:500;
  letter-spacing:.05em;
}

.status.success{
  color:var(--success);
}

.status.error{
  color:var(--error);
}

.answer-wrapper{
  position:relative;
}

.answer{
  margin-top:20px;
  padding:24px 60px 24px 24px;
  border-radius:16px;
  background:rgba(0,0,0,.4);
  border:1px solid var(--line);
  white-space:pre-wrap;
  font-size:17px;
  line-height:1.8;
  min-height:100px;
  color:var(--text-bright);
  backdrop-filter:blur(10px);
  transition:all .3s ease;
}

.answer.empty{
  color:var(--muted);
  font-style:italic;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
}

.answer:not(.empty){
  border-color:var(--panel-border);
  box-shadow:inset 0 0 20px rgba(212,175,55,.05);
}

.answer-actions{
  position:absolute;
  top:12px;
  right:12px;
  display:flex;
  gap:8px;
}

.premium-gate{
  margin-top:28px;
  padding:24px;
  background:linear-gradient(135deg, rgba(212,175,55,.1) 0%, rgba(212,175,55,.05) 100%);
  border:2px solid var(--gold);
  border-radius:20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.premium-gate::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(212,175,55,.1) 0%, transparent 70%);
  animation:premiumPulse 3s ease-in-out infinite;
}

@keyframes premiumPulse{
  0%, 100%{ transform:scale(1); opacity:.5; }
  50%{ transform:scale(1.1); opacity:.8; }
}

.premium-gate .label{
  color:var(--gold);
  font-size:12px;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:.2em;
}

.premium-gate h3{
  color:var(--text-bright);
  font-size:18px;
  font-weight:800;
  margin:0 0 6px;
  letter-spacing:.05em;
}

.premium-gate p{
  color:var(--muted);
  font-size:12px;
  margin:0 0 18px;
  line-height:1.6;
}

.premium-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
  z-index:1;
}

.premium-buttons a{
  display:inline-block;
  padding:14px 28px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
  font-size:13px;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing:.06em;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
}

.premium-buttons a::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  transition:left .5s;
}

.premium-buttons a:hover::before{
  left:100%;
}

.btn-premium{
  background:linear-gradient(135deg, var(--gold) 0%, #FFD700 100%);
  color:#000;
  box-shadow:0 8px 24px rgba(212,175,55,.4),
             0 0 0 1px rgba(212,175,55,.3);
}

.btn-premium:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(212,175,55,.5),
             0 0 0 1px rgba(212,175,55,.4);
}

.btn-premium-pro{
  background:transparent;
  color:var(--gold);
  border:2px solid var(--gold);
  box-shadow:0 0 20px rgba(212,175,55,.2);
}

.btn-premium-pro:hover{
  background:var(--gold);
  color:#000;
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(212,175,55,.4);
}

.loading{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid var(--muted);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.history-panel{
  max-height:300px;
  overflow-y:auto;
  margin-top:16px;
}

.history-item{
  padding:12px;
  border-radius:12px;
  background:rgba(0,0,0,.3);
  margin-bottom:8px;
  cursor:pointer;
  transition:all .3s;
  border:1px solid transparent;
}

.history-item:hover{
  background:rgba(212,175,55,.1);
  border-color:var(--gold);
  transform:translateX(4px);
}

.history-item .source{
  color:var(--text-bright);
  font-size:14px;
  margin-bottom:4px;
}

.history-item .target{
  color:var(--gold);
  font-size:13px;
}

@media (max-width:640px){
  .container{padding:20px 16px 48px}
  .card{padding:20px}
  .premium-buttons{
    flex-direction:column;
  }
  .premium-buttons a{
    width:100%;
  }
  textarea{
    padding:16px 50px 16px 16px;
    font-size:15px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="hero-section">
    <h1 class="hero-title">GLB v1.0</h1>
    <p class="hero-subtitle">NEXT BASE 瞬間翻訳兵器</p>
  </div>

  <div class="lang-selector">
    <select id="lang-from">
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="ko">한국어</option>

    </select>

      <div class="input-actions">

            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button class="icon-btn" id="clear-input" title="クリア">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        </button>
      </div>
    </div>
    <button id="send-btn" class="btn-primary">翻訳実行</button>
    <div id="status" class="status"></div>

  <div class="card">
    <div class="label">REPLY</div>
    <div class="answer-wrapper">
      <div id="answer" class="answer empty">翻訳結果がここに表示されます...</div>
      <div class="answer-actions" style="display:none;" id="answer-actions">
        <button class="icon-btn" id="copy-answer" title="コピー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <button class="icon-btn" id="favorite" title="お気に入りに保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>

    <div class="premium-gate">

      <div class="premium-buttons">
        <a href="https://buy.stripe.com/dRm3cx7Rj8KA0B1gyHasg01" class="btn-premium">BASIC $1.99</a>
        <a href="https://buy.stripe.com/cNi8wR8Vn8KA4Rh82basg02" class="btn-premium-pro">TRAVELER $7.99</a>

  <div class="card" id="history-card" style="display:none;">
    <div class="label">履歴</div>

<script>
// 言語設定
let currentFromLang = "ja";
let currentToLang = "en";

// 音声認識・合成
let recognition = null;
let synth = window.speechSynthesis;

// 履歴管理
let history = [];

// 内蔵簡易翻訳テーブル
const fallbackDict = new Map([
  ["おはよう", "Good morning"],
  ["こんにちは", "Hello"],
  ["こんばんは", "Good evening"],
  ["ありがとう", "Thank you"],
  ["さようなら", "Goodbye"],
  ["hello", "こんにちは"],
  ["goodbye", "さようなら"],
  ["thank you", "ありがとう"],
  ["good morning", "おはよう"],
  ["good evening", "こんばんは"]
]);

// 150k辞書
let dict150k = null;
let dictLoaded = false;
let dictIndex = new Map();

// ユーザー辞書（オンデバイス）
let userDict = new Map();

// ユーザー辞書のロード
function loadUserDict() {
  try {
    const stored = localStorage.getItem("glb_user_dict");
    if (stored) {
      const data = JSON.parse(stored);
      userDict = new Map(data);
      console.log("[オンデバイス辞書] 読み込み完了:", userDict.size, "語");
    }
  } catch (e) {
    console.warn("ユーザー辞書読み込み失敗:", e);
  }
}

// 履歴のロード
function loadHistory() {
  try {
    const stored = localStorage.getItem("glb_history");
    if (stored) {
      history = JSON.parse(stored);
      if (history.length > 0) {
        document.getElementById("history-card").style.display = "block";
        renderHistory();
      }
    }
  } catch (e) {
    console.warn("履歴読み込み失敗:", e);
  }
}

// 履歴の保存
function saveHistory(source, target, fromLang, toLang) {
  history.unshift({
    source,
    target,
    fromLang,
    toLang,
    timestamp: Date.now()
  });
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem("glb_history", JSON.stringify(history));
  document.getElementById("history-card").style.display = "block";
  renderHistory();
}

// 履歴の表示
function renderHistory() {
  const panel = document.getElementById("history-panel");
  panel.innerHTML = history.slice(0, 10).map(item => `
    <div class="history-item" data-source="${item.source}" data-target="${item.target}">
      <div class="source">${item.source}</div>
      <div class="target">${item.target}</div>
    </div>
  `).join("");
  
  panel.querySelectorAll(".history-item").forEach(item => {
    item.addEventListener("click", () => {
      document.getElementById("user-input").value = item.dataset.source;
      handleSend();
    });
  });
}

// 150k辞書のロード
async function load150kDict() {
  if (dictLoaded) return dict150k;
  
  try {
    const res = await fetch("../../dictionary/150k.csv");
    if (!res.ok) {
      console.warn("150k.csv not found");
      dictLoaded = true;
      return null;
    }
    const text = await res.text();
    const lines = text.split("\n");
    
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const [source, target, from, to] = line.split(",");
      if (!source || !target) continue;
      
      const key = `${from}-${to}:${source.trim().toLowerCase()}`;
      dictIndex.set(key, target.trim());
    }
    
    dictLoaded = true;
    console.log("[150k辞書インデックス] 構築完了:", dictIndex.size, "語");
    return dictIndex;
  } catch (e) {
    console.warn("150k辞書読み込み失敗:", e);
    dictLoaded = true;
    return null;
  }
}

// 辞書検索
function searchDict(query, fromLang, toLang) {
  const normalized = query.trim().toLowerCase();
  const key = `${fromLang}-${toLang}:${normalized}`;
  
  if (userDict.has(key)) {
    return { result: userDict.get(key), source: "user_dict" };
  }
  
  if (dictIndex.has(key)) {
    return { result: dictIndex.get(key), source: "150k_dict" };
  }
  
  const fallbackKey = fromLang === "ja" ? normalized : normalized;
  if (fallbackDict.has(fallbackKey)) {
    return { result: fallbackDict.get(fallbackKey), source: "fallback" };
  }
  
  return null;
}

// ユーザー辞書に保存
function saveToUserDict(source, target, fromLang, toLang) {
  try {
    const key = `${fromLang}-${toLang}:${source.trim().toLowerCase()}`;
    userDict.set(key, target.trim());
    
    const data = Array.from(userDict.entries());
    localStorage.setItem("glb_user_dict", JSON.stringify(data));
    
    return true;
  } catch (e) {
    console.error("オンデバイス保存失敗:", e);
    return false;
  }
}

// Gemini翻訳
async function translateWithGemini(text, fromLang, toLang) {
  const NE_GATEWAY_URL = "https://YOUR_BACKEND_ENDPOINT";
  const API_KEY = "YOUR_REAL_AUTHORIZED_KEY";
  
  if (NE_GATEWAY_URL === "https://YOUR_BACKEND_ENDPOINT" || API_KEY === "YOUR_REAL_AUTHORIZED_KEY") {
    return null;
  }
  
  try {
    const dictContext = [];
    const queryWords = text.toLowerCase().split(/\s+/);
    let contextCount = 0;
    
    for (const [key, value] of dictIndex.entries()) {
      if (contextCount >= 10) break;
      if (key.includes(`${fromLang}-${toLang}:`)) {
        const dictWord = key.split(":")[1];
        if (queryWords.some(w => dictWord.includes(w) || w.includes(dictWord))) {
          dictContext.push(`${dictWord} → ${value}`);
          contextCount++;
        }
      }
    }
    
    const systemPrompt = `You are a professional translator with access to a 150,000-word dictionary. 
Use the following dictionary entries as context for the best translation:
${dictContext.length > 0 ? dictContext.join("\n") : "No direct matches, use your knowledge."}

Translate the following text from ${fromLang} to ${toLang} with natural, context-aware translation:`;
    
    const response = await fetch(NE_GATEWAY_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-KEY": API_KEY
      },
      body: JSON.stringify({
        prompt: `${systemPrompt}\n\n${text}`,
        mode: "low_cost_0.08",
        from: fromLang,
        to: toLang
      })
    });
    
    if (response.ok) {
      const data = await response.json();
      if (data && data.reply) {
        saveToUserDict(text, data.reply, fromLang, toLang);
        return { reply: data.reply, source: "gemini" };
      }
    }
  } catch (e) {
    console.warn("Gemini API error:", e);
  }
  
  return null;
}

// 翻訳実行
async function translate(text, fromLang, toLang) {
  const dictResult = searchDict(text, fromLang, toLang);
  if (dictResult) {
    return { reply: dictResult.result, source: dictResult.source };
  }
  
  const geminiResult = await translateWithGemini(text, fromLang, toLang);
  if (geminiResult) {
    return geminiResult;
  }
  
  if (fromLang === "ja") {
    return { reply: `[System Reconnecting...] "${text}" の翻訳を準備中です。PREMIUM PASSで高精度翻訳を解放できます。`, source: "fallback" };
  } else {
    return { reply: `[System Reconnecting...] "${text}" の翻訳を準備中です。PREMIUM PASSで高精度翻訳を解放できます。`, source: "fallback" };
  }
}

// UI要素
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const statusEl = document.getElementById("status");
const answerEl = document.getElementById("answer");
const answerActions = document.getElementById("answer-actions");
const langFrom = document.getElementById("lang-from");
const langTo = document.getElementById("lang-to");
const swapBtn = document.getElementById("swap-lang");
const voiceInputBtn = document.getElementById("voice-input");
const clearInputBtn = document.getElementById("clear-input");
const copyAnswerBtn = document.getElementById("copy-answer");
const voiceOutputBtn = document.getElementById("voice-output");
const favoriteBtn = document.getElementById("favorite");

// 言語切り替え
langFrom.addEventListener("change", () => {
  currentFromLang = langFrom.value;
});

langTo.addEventListener("change", () => {
  currentToLang = langTo.value;
});

// スワップ
swapBtn.addEventListener("click", () => {
  [currentFromLang, currentToLang] = [currentToLang, currentFromLang];
  langFrom.value = currentFromLang;
  langTo.value = currentToLang;
});

// クリア
clearInputBtn.addEventListener("click", () => {
  inputEl.value = "";
  inputEl.focus();
});

// コピー
copyAnswerBtn.addEventListener("click", async () => {
  const text = answerEl.textContent;
  try {
    await navigator.clipboard.writeText(text);
    copyAnswerBtn.style.background = "var(--success)";
    setTimeout(() => {
      copyAnswerBtn.style.background = "";
    }, 1000);
  } catch (e) {
    console.error("コピー失敗:", e);
  }
});

// 音声出力
voiceOutputBtn.addEventListener("click", () => {
  const text = answerEl.textContent;
  if (!text || answerEl.classList.contains("empty")) return;
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = langTo.value === "ja" ? "ja-JP" : langTo.value + "-" + langTo.value.toUpperCase();
  synth.speak(utterance);
});

// お気に入り
favoriteBtn.addEventListener("click", () => {
  const source = inputEl.value;
  const target = answerEl.textContent;
  if (!source || !target || answerEl.classList.contains("empty")) return;
  
  saveHistory(source, target, currentFromLang, currentToLang);
  favoriteBtn.style.background = "var(--gold)";
  setTimeout(() => {
    favoriteBtn.style.background = "";
  }, 1000);
});

// 音声入力
if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  
  recognition.onstart = () => {
    voiceInputBtn.classList.add("active");
  };
  
  recognition.onend = () => {
    voiceInputBtn.classList.remove("active");
  };
  
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    inputEl.value = transcript;
    handleSend();
  };
  
  voiceInputBtn.addEventListener("click", () => {
    if (recognition) {
      recognition.lang = langFrom.value === "ja" ? "ja-JP" : langFrom.value + "-" + langFrom.value.toUpperCase();
      recognition.start();
    }
  });
} else {
  voiceInputBtn.style.display = "none";
}

// 送信処理
async function handleSend() {
  const text = (inputEl.value || "").trim();
  if (!text) return;

  sendBtn.disabled = true;
  statusEl.innerHTML = '<span class="loading"></span>翻訳中...';
  statusEl.className = "status";
  answerEl.classList.add("empty");
  answerEl.textContent = "";
  answerActions.style.display = "none";

  try {
    const result = await translate(text, currentFromLang, currentToLang);
    
    answerEl.textContent = result.reply;
    answerEl.classList.remove("empty");
    answerActions.style.display = "flex";
    
    const sourceNames = {
      "user_dict": "あなたの辞書（オンデバイス）",
      "150k_dict": "150k辞書",
      "gemini": "Gemini Pro",
      "fallback": "System Reconnecting..."
    };
    
    statusEl.textContent = `✓ ${sourceNames[result.source] || "翻訳完了"}`;
    statusEl.className = result.source === "fallback" ? "status error" : "status success";
    
    saveHistory(text, result.reply, currentFromLang, currentToLang);
    
    if (result.source === "150k_dict" || result.source === "fallback") {
      saveToUserDict(text, result.reply, currentFromLang, currentToLang);
    }
  } catch (err) {
    console.error(err);
    answerEl.textContent = "[System Error] エラーが発生しました。もう一度お試しください。";
    answerEl.classList.remove("empty");
    statusEl.textContent = "✗ エラー";
    statusEl.className = "status error";
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    handleSend();
  }
});

// 初期化
loadUserDict();
loadHistory();
load150kDict().then(() => {
  const userCount = userDict.size;
  if (dictIndex.size > 0) {
    statusEl.textContent = `✓ 150k辞書インデックス + あなたの辞書(${userCount}語) 準備完了`;
    statusEl.className = "status success";
  } else {
    statusEl.textContent = userCount > 0 ? `簡易辞書 + あなたの辞書(${userCount}語)` : "簡易辞書モード";
  }
});
</script>
