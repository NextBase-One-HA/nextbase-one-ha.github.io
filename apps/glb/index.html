<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>GLB v1.0 - NEXT BASE | 瞬間翻訳兵器</title>

<style>
:root{
  --gold:#D4AF37;
  --gold-glow:rgba(212,175,55,.4);
  --bg:#000000;
  --bg-gradient:linear-gradient(135deg, #0a0a0a 0%, #000000 50%, #050505 100%);
  --panel:rgba(15,15,15,.95);
  --panel-border:rgba(212,175,55,.2);
  --line:#1a1a1a;
  --text:#f5f5f5;
  --text-bright:#ffffff;
  --muted:#888888;
  --success:#4ade80;
  --error:#ef4444;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  background-image:var(--bg-gradient);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:radial-gradient(circle at 20% 50%, rgba(212,175,55,.03) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(212,175,55,.02) 0%, transparent 50%);
  pointer-events:none;
  z-index:0;
}

.container{
  max-width:800px;
  margin:0 auto;
  padding:32px 24px 64px;
  position:relative;
  z-index:1;
}

.hero-section{
  text-align:center;
  margin-bottom:40px;
  padding:24px 0;
}

.hero-title{
  color:var(--gold);
  font-size:clamp(32px,7vw,52px);
  font-weight:900;
  letter-spacing:-.02em;
  margin:0 0 12px;
  text-shadow:0 0 30px var(--gold-glow),
              0 4px 20px rgba(0,0,0,.5);
  background:linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.hero-subtitle{
  color:var(--muted);
  font-size:15px;
  font-weight:500;
  letter-spacing:.1em;
  margin:0;
  text-transform:uppercase;
}

.lang-toggle{
  display:flex;
  gap:8px;
  margin-bottom:32px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:16px;
  padding:6px;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}

.lang-toggle button{
  flex:1;
  padding:14px 20px;
  border:none;
  background:transparent;
  color:var(--muted);
  border-radius:12px;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing:.05em;
  position:relative;
  overflow:hidden;
}

.lang-toggle button::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(212,175,55,.1), transparent);
  transition:left .5s;
}

.lang-toggle button:hover::before{
  left:100%;
}

.lang-toggle button.active{
  background:linear-gradient(135deg, var(--gold) 0%, #FFD700 100%);
  color:#000;
  box-shadow:0 4px 20px var(--gold-glow),
             0 0 0 1px rgba(212,175,55,.3);
  transform:scale(1.02);
}

.card{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:24px;
  padding:32px;
  margin-bottom:24px;
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,.5),
             0 0 0 1px rgba(212,175,55,.1);
  transition:all .3s ease;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity:0;
  transition:opacity .3s;
}

.card:hover::before{
  opacity:1;
}

.label{
  color:var(--gold);
  letter-spacing:.15em;
  font-weight:800;
  font-size:11px;
  margin-bottom:16px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}

.label::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--gold), transparent);
  opacity:.3;
}

textarea{
  width:100%;
  min-height:160px;
  border-radius:16px;
  border:2px solid var(--line);
  background:rgba(0,0,0,.4);
  color:var(--text-bright);
  padding:20px;
  font-size:16px;
  line-height:1.7;
  resize:vertical;
  font-family:inherit;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter:blur(10px);
}

textarea:focus{
  outline:none;
  border-color:var(--gold);
  background:rgba(0,0,0,.6);
  box-shadow:0 0 0 4px var(--gold-glow),
             0 8px 32px rgba(212,175,55,.2),
             inset 0 0 20px rgba(212,175,55,.05);
  transform:translateY(-2px);
}

textarea::placeholder{
  color:var(--muted);
  opacity:.6;
}

button.btn-primary{
  width:100%;
  text-align:center;
  border-radius:16px;
  padding:20px 32px;
  margin-top:20px;
  font-weight:800;
  letter-spacing:.08em;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  border:none;
  cursor:pointer;
  font-size:16px;
  background:linear-gradient(135deg, var(--gold) 0%, #FFD700 100%);
  color:#000;
  box-shadow:0 8px 24px rgba(212,175,55,.3),
             0 0 0 1px rgba(212,175,55,.2);
  position:relative;
  overflow:hidden;
  text-transform:uppercase;
}

button.btn-primary::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  transform:translate(-50%, -50%);
  transition:width .6s, height .6s;
}

button.btn-primary:hover::before{
  width:300px;
  height:300px;
}

button.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(212,175,55,.4),
             0 0 0 1px rgba(212,175,55,.3);
}

button.btn-primary:active{
  transform:translateY(0);
}

button.btn-primary:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

.status{
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
  min-height:20px;
  text-align:center;
  font-weight:500;
  letter-spacing:.05em;
}

.status.success{
  color:var(--success);
}

.status.error{
  color:var(--error);
}

.answer{
  margin-top:20px;
  padding:24px;
  border-radius:16px;
  background:rgba(0,0,0,.4);
  border:1px solid var(--line);
  white-space:pre-wrap;
  font-size:17px;
  line-height:1.8;
  min-height:100px;
  color:var(--text-bright);
  backdrop-filter:blur(10px);
  transition:all .3s ease;
}

.answer.empty{
  color:var(--muted);
  font-style:italic;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
}

.answer:not(.empty){
  border-color:var(--panel-border);
  box-shadow:inset 0 0 20px rgba(212,175,55,.05);
}

.premium-gate{
  margin-top:32px;
  padding:28px;
  background:linear-gradient(135deg, rgba(212,175,55,.1) 0%, rgba(212,175,55,.05) 100%);
  border:2px solid var(--gold);
  border-radius:20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.premium-gate::before{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(212,175,55,.1) 0%, transparent 70%);
  animation:premiumPulse 3s ease-in-out infinite;
}

@keyframes premiumPulse{
  0%, 100%{ transform:scale(1); opacity:.5; }
  50%{ transform:scale(1.1); opacity:.8; }
}

.premium-gate .label{
  color:var(--gold);
  font-size:13px;
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:.2em;
}

.premium-gate h3{
  color:var(--text-bright);
  font-size:20px;
  font-weight:800;
  margin:0 0 8px;
  letter-spacing:.05em;
}

.premium-gate p{
  color:var(--muted);
  font-size:13px;
  margin:0 0 20px;
  line-height:1.6;
}

.premium-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  position:relative;
  z-index:1;
}

.premium-buttons a{
  display:inline-block;
  padding:16px 32px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
  font-size:14px;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing:.06em;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
}

.premium-buttons a::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  transition:left .5s;
}

.premium-buttons a:hover::before{
  left:100%;
}

.btn-premium{
  background:linear-gradient(135deg, var(--gold) 0%, #FFD700 100%);
  color:#000;
  box-shadow:0 8px 24px rgba(212,175,55,.4),
             0 0 0 1px rgba(212,175,55,.3);
}

.btn-premium:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(212,175,55,.5),
             0 0 0 1px rgba(212,175,55,.4);
}

.btn-premium-pro{
  background:transparent;
  color:var(--gold);
  border:2px solid var(--gold);
  box-shadow:0 0 20px rgba(212,175,55,.2);
}

.btn-premium-pro:hover{
  background:var(--gold);
  color:#000;
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(212,175,55,.4);
}

.loading{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid var(--muted);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

@media (max-width:640px){
  .container{padding:24px 16px 48px}
  .card{padding:24px}
  .premium-buttons{
    flex-direction:column;
  }
  .premium-buttons a{
    width:100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="hero-section">
    <h1 class="hero-title">GLB v1.0</h1>
    <p class="hero-subtitle">NEXT BASE 瞬間翻訳兵器</p>
  </div>

  <div class="lang-toggle">
    <button id="lang-ja-en" class="active">日本語 → 英語</button>
    <button id="lang-en-ja">英語 → 日本語</button>
  </div>

  <div class="card">
    <div class="label">INPUT</div>
    <textarea id="user-input" placeholder="翻訳したい文章を入力してください..."></textarea>
    <button id="send-btn" class="btn-primary">翻訳実行</button>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <div class="label">REPLY</div>
    <div id="answer" class="answer empty">翻訳結果がここに表示されます...</div>
    
    <div class="premium-gate">
      <div class="label">PREMIUM PASS</div>
      <h3>世界の扉を開く</h3>
      <p>Gemini Pro の高精度翻訳と無制限アクセスを解放</p>
      <div class="premium-buttons">
        <a href="https://buy.stripe.com/dRm3cx7Rj8KA0B1gyHasg01" class="btn-premium">BASIC $1.99</a>
        <a href="https://buy.stripe.com/cNi8wR8Vn8KA4Rh82basg02" class="btn-premium-pro">TRAVELER $7.99</a>
      </div>
    </div>
  </div>
</div>

<script>
// 言語設定
let currentLang = "ja-en";

// 内蔵簡易翻訳テーブル（フォールバック用）
const fallbackDict = new Map([
  ["おはよう", "Good morning"],
  ["こんにちは", "Hello"],
  ["こんばんは", "Good evening"],
  ["ありがとう", "Thank you"],
  ["さようなら", "Goodbye"],
  ["hello", "こんにちは"],
  ["goodbye", "さようなら"],
  ["thank you", "ありがとう"],
  ["good morning", "おはよう"],
  ["good evening", "こんばんは"]
]);

// 150k辞書（検索インデックスとして常駐）
let dict150k = null;
let dictLoaded = false;
let dictIndex = new Map(); // 高速検索用インデックス

// ユーザー辞書（オンデバイス）
let userDict = new Map();

// ユーザー辞書のロード
function loadUserDict() {
  try {
    const stored = localStorage.getItem("glb_user_dict");
    if (stored) {
      const data = JSON.parse(stored);
      userDict = new Map(data);
      console.log("[オンデバイス辞書] 読み込み完了:", userDict.size, "語");
    }
  } catch (e) {
    console.warn("ユーザー辞書読み込み失敗:", e);
  }
}

// 150k辞書のロード（検索インデックスとして最適化）
async function load150kDict() {
  if (dictLoaded) return dict150k;
  
  try {
    const res = await fetch("../../dictionary/150k.csv");
    if (!res.ok) {
      console.warn("150k.csv not found");
      dictLoaded = true;
      return null;
    }
    const text = await res.text();
    const lines = text.split("\n");
    
    // 検索インデックスを構築
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const [source, target, from, to] = line.split(",");
      if (!source || !target) continue;
      
      const key = `${from}-${to}:${source.trim().toLowerCase()}`;
      dictIndex.set(key, target.trim());
    }
    
    dictLoaded = true;
    console.log("[150k辞書インデックス] 構築完了:", dictIndex.size, "語");
    return dictIndex;
  } catch (e) {
    console.warn("150k辞書読み込み失敗:", e);
    dictLoaded = true;
    return null;
  }
}

// 辞書検索（最適化済み）
function searchDict(query, fromLang, toLang) {
  const normalized = query.trim().toLowerCase();
  const key = `${fromLang}-${toLang}:${normalized}`;
  
  // 1. ユーザー辞書（最優先）
  if (userDict.has(key)) {
    return { result: userDict.get(key), source: "user_dict" };
  }
  
  // 2. 150k辞書インデックス
  if (dictIndex.has(key)) {
    return { result: dictIndex.get(key), source: "150k_dict" };
  }
  
  // 3. フォールバック
  const fallbackKey = fromLang === "ja" ? normalized : normalized;
  if (fallbackDict.has(fallbackKey)) {
    return { result: fallbackDict.get(fallbackKey), source: "fallback" };
  }
  
  return null;
}

// ユーザー辞書に保存（オンデバイス）
function saveToUserDict(source, target, fromLang, toLang) {
  try {
    const key = `${fromLang}-${toLang}:${source.trim().toLowerCase()}`;
    userDict.set(key, target.trim());
    
    const data = Array.from(userDict.entries());
    localStorage.setItem("glb_user_dict", JSON.stringify(data));
    
    console.log(`[オンデバイス保存] "${source}" → "${target}"`);
    return true;
  } catch (e) {
    console.error("オンデバイス保存失敗:", e);
    return false;
  }
}

// API同期（非同期）
async function syncUserDictToAPI(source, target, fromLang, toLang) {
  const API_SYNC_URL = "https://YOUR_BACKEND_ENDPOINT/api/user-dict";
  const API_KEY = "YOUR_REAL_AUTHORIZED_KEY";
  
  if (API_SYNC_URL === "https://YOUR_BACKEND_ENDPOINT/api/user-dict") {
    return;
  }
  
  try {
    await fetch(API_SYNC_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-KEY": API_KEY
      },
      body: JSON.stringify({
        source: source.trim(),
        target: target.trim(),
        from: fromLang,
        to: toLang,
        timestamp: Date.now()
      })
    });
  } catch (e) {
    console.warn("API同期失敗:", e);
  }
}

// Gemini翻訳（辞書データを組み込んだプロンプト）
async function translateWithGemini(text, fromLang, toLang) {
  const NE_GATEWAY_URL = "https://YOUR_BACKEND_ENDPOINT";
  const API_KEY = "YOUR_REAL_AUTHORIZED_KEY";
  
  if (NE_GATEWAY_URL === "https://YOUR_BACKEND_ENDPOINT" || API_KEY === "YOUR_REAL_AUTHORIZED_KEY") {
    return null;
  }
  
  try {
    // 150k辞書の関連エントリを取得（プロンプトに組み込む）
    const dictContext = [];
    const queryWords = text.toLowerCase().split(/\s+/);
    let contextCount = 0;
    
    for (const [key, value] of dictIndex.entries()) {
      if (contextCount >= 10) break; // 最大10エントリ
      if (key.includes(`${fromLang}-${toLang}:`)) {
        const dictWord = key.split(":")[1];
        if (queryWords.some(w => dictWord.includes(w) || w.includes(dictWord))) {
          dictContext.push(`${dictWord} → ${value}`);
          contextCount++;
        }
      }
    }
    
    const systemPrompt = `You are a professional translator with access to a 150,000-word dictionary. 
Use the following dictionary entries as context for the best translation:
${dictContext.length > 0 ? dictContext.join("\n") : "No direct matches, use your knowledge."}

Translate the following text from ${fromLang} to ${toLang} with natural, context-aware translation:`;
    
    const response = await fetch(NE_GATEWAY_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-KEY": API_KEY
      },
      body: JSON.stringify({
        prompt: `${systemPrompt}\n\n${text}`,
        mode: "low_cost_0.08",
        from: fromLang,
        to: toLang
      })
    });
    
    if (response.ok) {
      const data = await response.json();
      if (data && data.reply) {
        // オンデバイスに保存
        saveToUserDict(text, data.reply, fromLang, toLang);
        syncUserDictToAPI(text, data.reply, fromLang, toLang);
        return { reply: data.reply, source: "gemini" };
      }
    }
  } catch (e) {
    console.warn("Gemini API error:", e);
  }
  
  return null;
}

// 翻訳実行
async function translate(text, fromLang, toLang) {
  // 1. 辞書検索（最優先）
  const dictResult = searchDict(text, fromLang, toLang);
  if (dictResult) {
    return { reply: dictResult.result, source: dictResult.source };
  }
  
  // 2. Gemini API（辞書データ組み込み）
  const geminiResult = await translateWithGemini(text, fromLang, toLang);
  if (geminiResult) {
    return geminiResult;
  }
  
  // 3. フォールバック
  if (fromLang === "ja") {
    return { reply: `[System Reconnecting...] "${text}" の英語翻訳を準備中です。PREMIUM PASSで高精度翻訳を解放できます。`, source: "fallback" };
  } else {
    return { reply: `[System Reconnecting...] "${text}" の日本語翻訳を準備中です。PREMIUM PASSで高精度翻訳を解放できます。`, source: "fallback" };
  }
}

// UI要素
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const statusEl = document.getElementById("status");
const answerEl = document.getElementById("answer");
const langJaEn = document.getElementById("lang-ja-en");
const langEnJa = document.getElementById("lang-en-ja");

// 言語切り替え
langJaEn.addEventListener("click", () => {
  currentLang = "ja-en";
  langJaEn.classList.add("active");
  langEnJa.classList.remove("active");
  inputEl.placeholder = "翻訳したい日本語を入力してください...";
});

langEnJa.addEventListener("click", () => {
  currentLang = "en-ja";
  langJaEn.classList.remove("active");
  langEnJa.classList.add("active");
  inputEl.placeholder = "Enter text to translate...";
});

// 送信処理
async function handleSend() {
  const text = (inputEl.value || "").trim();
  if (!text) return;

  sendBtn.disabled = true;
  statusEl.innerHTML = '<span class="loading"></span>翻訳中...';
  statusEl.className = "status";
  answerEl.classList.add("empty");
  answerEl.textContent = "";

  try {
    const [fromLang, toLang] = currentLang === "ja-en" ? ["ja", "en"] : ["en", "ja"];
    const result = await translate(text, fromLang, toLang);
    
    answerEl.textContent = result.reply;
    answerEl.classList.remove("empty");
    
    const sourceNames = {
      "user_dict": "あなたの辞書（オンデバイス）",
      "150k_dict": "150k辞書",
      "gemini": "Gemini Pro",
      "fallback": "System Reconnecting..."
    };
    
    statusEl.textContent = `✓ ${sourceNames[result.source] || "翻訳完了"}`;
    statusEl.className = result.source === "fallback" ? "status error" : "status success";
    
    // 辞書から取得した場合も保存（次回最優先）
    if (result.source === "150k_dict" || result.source === "fallback") {
      saveToUserDict(text, result.reply, fromLang, toLang);
    }
  } catch (err) {
    console.error(err);
    answerEl.textContent = "[System Error] エラーが発生しました。もう一度お試しください。";
    answerEl.classList.remove("empty");
    statusEl.textContent = "✗ エラー";
    statusEl.className = "status error";
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener("click", handleSend);
inputEl.addEventListener("keydown", (e) => {

    e.preventDefault();
    handleSend();

});
